<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Pelada do Filhão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
/* ── RESET ───────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --r1:#7F1D1D;--r2:#991B1B;--r3:#B91C1C;--r4:#DC2626;--r5:#EF4444;
  --y1:#78350F;--y2:#92400E;--y3:#B45309;--y4:#D97706;--y5:#F59E0B;--y6:#FCD34D;
  --bg:#0D0000;--bg2:#170808;--bg3:#1F0A0A;--bg4:#2A0D0D;
  --bdr:rgba(239,68,68,.15);--bdr2:rgba(245,158,11,.2);
  --t1:#FFF7ED;--t2:#FECACA;--t3:#FCA5A5;--t4:#9CA3AF;
  --rad:10px;--radl:14px
}
html{background:var(--bg);color:var(--t1);font-family:'Barlow',sans-serif;font-size:14px}
body{max-width:980px;margin:0 auto;padding:12px 14px;min-height:100vh}

/* noise overlay */
body::before{content:"";position:fixed;inset:0;opacity:.03;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
#app{position:relative;z-index:1}

/* ── HEADER ──────────────────────────────── */
.hd{
  background:linear-gradient(135deg,var(--r1) 0%,#3D0000 60%,#1A0800 100%);
  border:1px solid rgba(245,158,11,.25);border-radius:var(--radl);
  padding:16px 22px;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px;margin-bottom:10px;
  box-shadow:0 4px 32px rgba(185,28,28,.35),inset 0 1px 0 rgba(245,158,11,.1);
  position:relative;overflow:hidden;
}
.hd::after{content:"";position:absolute;top:-40%;right:-5%;width:320px;height:320px;
  background:radial-gradient(circle,rgba(245,158,11,.08) 0%,transparent 70%);pointer-events:none}
.hd-l{display:flex;align-items:center;gap:14px;position:relative;z-index:1}
.hd-logo{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--y4),var(--y2));
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;
  box-shadow:0 0 20px rgba(245,158,11,.4);border:2px solid rgba(245,158,11,.3);
}
.hd-title{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--y5);letter-spacing:2px;line-height:1;
  text-shadow:0 0 20px rgba(245,158,11,.5)}
.hd-sub{font-size:11px;color:var(--t3);margin-top:3px;letter-spacing:.5px;text-transform:uppercase}
.hd-stats{display:flex;gap:22px;position:relative;z-index:1}
.hs{text-align:center}
.hs-v{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--y5);line-height:1;
  text-shadow:0 0 15px rgba(245,158,11,.4)}
.hs-l{font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}

/* ── LIVE BADGE ───────────────────────────── */
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--y5);
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);
  border-radius:20px;padding:3px 10px;letter-spacing:.5px;text-transform:uppercase}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--y5);
  animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(245,158,11,.4)}
  50%{opacity:.7;box-shadow:0 0 0 4px rgba(245,158,11,0)}}

/* ── NAV ─────────────────────────────────── */
.nav{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--bdr);
  border-radius:var(--rad);margin-bottom:12px;padding:4px;flex-wrap:wrap}
.nb{flex:1;min-width:68px;padding:9px 6px;border:none;background:transparent;color:var(--t4);
  border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;font-family:'Barlow',sans-serif;
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;
  text-transform:uppercase;letter-spacing:.4px}
.nb.on{background:linear-gradient(135deg,var(--r2),var(--r1));color:var(--y5);
  box-shadow:0 2px 12px rgba(185,28,28,.4)}
.nb:hover:not(.on){background:var(--bg3);color:var(--t1)}

/* ── TABS ────────────────────────────────── */
.tab{display:none}
.tab.on{display:block;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ── PODIUM ──────────────────────────────── */
.pod{display:flex;justify-content:center;align-items:flex-end;gap:12px;padding:20px 0 12px;flex-wrap:wrap}
.pi{display:flex;flex-direction:column;align-items:center;gap:7px}
.pav{border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-family:'Bebas Neue',sans-serif;border:3px solid transparent;transition:transform .2s}
.pav:hover{transform:scale(1.07)}
.p1 .pav{width:72px;height:72px;font-size:20px;
  background:linear-gradient(135deg,var(--r2),var(--r1));
  border-color:var(--y5);color:var(--y5);box-shadow:0 0 24px rgba(245,158,11,.4)}
.p2 .pav{width:56px;height:56px;font-size:15px;
  background:var(--bg3);border-color:rgba(245,158,11,.4);color:var(--y4)}
.p3 .pav{width:56px;height:56px;font-size:15px;
  background:var(--bg3);border-color:rgba(239,68,68,.4);color:var(--r5)}
.pnm{font-size:12px;color:var(--t3);text-align:center;max-width:90px}
.ppt{font-size:14px;font-weight:700;color:var(--y5);font-family:'Bebas Neue',sans-serif;font-size:18px}
.pmd{font-size:22px}
.ppl{width:80px;border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:20px;color:rgba(255,255,255,.1)}
.pl1{height:84px;background:linear-gradient(180deg,rgba(185,28,28,.6),rgba(127,29,29,.3))}
.pl2{height:60px;background:linear-gradient(180deg,rgba(127,29,29,.4),rgba(90,15,15,.2))}
.pl3{height:44px;background:linear-gradient(180deg,rgba(90,15,15,.35),rgba(60,10,10,.15))}

/* ── SECTION TITLE ───────────────────────── */
.st{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--t1);
  display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.bdg{font-size:10px;padding:2px 10px;border-radius:20px;font-weight:700;letter-spacing:.6px;font-family:'Barlow',sans-serif}
.bdg-r{background:rgba(185,28,28,.25);color:var(--r5);border:1px solid rgba(239,68,68,.3)}
.bdg-y{background:rgba(180,83,9,.25);color:var(--y5);border:1px solid rgba(245,158,11,.3)}
.bdg-m{font-size:12px;color:var(--t4);font-weight:500;font-family:'Barlow',sans-serif;letter-spacing:0}

/* ── SEARCH / FILTER ─────────────────────── */
.sb{display:flex;align-items:center;gap:8px;background:var(--bg3);
  border:1px solid var(--bdr);border-radius:var(--rad);padding:8px 14px;margin-bottom:10px;
  transition:border-color .2s}
.sb:focus-within{border-color:rgba(245,158,11,.3)}
.sb input{border:none;background:transparent;flex:1;font-size:13px;color:var(--t1);
  outline:none;font-family:'Barlow',sans-serif}
.sb input::placeholder{color:var(--t4)}
.fr{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.fb{padding:5px 16px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;
  border:1px solid var(--bdr);background:transparent;color:var(--t4);transition:all .12s;
  font-family:'Barlow',sans-serif;text-transform:uppercase;letter-spacing:.5px}
.fb.on{background:rgba(185,28,28,.3);color:var(--y5);border-color:rgba(245,158,11,.3)}
.fb:hover:not(.on){background:var(--bg3);color:var(--t1)}

/* ── TABLE ───────────────────────────────── */
.tw{border:1px solid var(--bdr);border-radius:var(--radl);overflow:hidden;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:linear-gradient(135deg,var(--r1),#250A0A);color:var(--t4);
  font-size:10px;text-transform:uppercase;letter-spacing:.6px;padding:10px 12px;
  text-align:left;font-weight:700;font-family:'Barlow',sans-serif}
tbody tr{border-top:1px solid var(--bdr);transition:background .1s}
tbody tr:hover{background:rgba(185,28,28,.06)}
td{padding:10px 12px;color:var(--t1);vertical-align:middle}
.rn{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--t4)}
.r1c{color:var(--y5)!important;text-shadow:0 0 8px rgba(245,158,11,.4)}
.r2c{color:var(--y4)!important}
.r3c{color:var(--r5)!important}
.pv{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--y5)}
.pnc{font-weight:600;font-size:13px}
.tb{font-size:10px;padding:2px 9px;border-radius:10px;display:inline-block;font-weight:700;
  font-family:'Barlow',sans-serif;letter-spacing:.3px}
.tm{background:rgba(185,28,28,.2);color:var(--r5);border:1px solid rgba(239,68,68,.3)}
.td{background:rgba(180,83,9,.2);color:var(--y5);border:1px solid rgba(245,158,11,.3)}
.bw{display:flex;align-items:center;gap:7px}
.bl{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--r4),var(--y4))}
.pl{font-size:11px;color:var(--t4);min-width:40px}
.fc{display:flex;gap:3px}
.fv{width:18px;height:18px;border-radius:3px;background:rgba(22,163,74,.2);color:#4ade80;
  font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.fe{width:18px;height:18px;border-radius:3px;background:rgba(180,83,9,.3);color:var(--y5);
  font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.fd{width:18px;height:18px;border-radius:3px;background:rgba(127,29,29,.4);color:var(--r5);
  font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
@media(max-width:560px){.hm{display:none!important}}

/* ── STAT CARDS ──────────────────────────── */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:10px;margin-bottom:16px}
.sc{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px 16px;
  position:relative;overflow:hidden}
.sc::after{content:"";position:absolute;bottom:-10px;right:-10px;width:60px;height:60px;
  border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.08),transparent 70%)}
.sl{font-size:11px;color:var(--t4);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.sv{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--t1);line-height:1}
.ss{font-size:11px;color:var(--y5);margin-top:4px;font-weight:600}

/* ── BARS ────────────────────────────────── */
.gb{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--y4),var(--y5));display:inline-block}
.ab{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--r3),var(--r5));display:inline-block}

/* ── PLAYER CARDS ────────────────────────── */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:10px}
.pc{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--radl);padding:14px;
  transition:border-color .15s,box-shadow .15s}
.pc:hover{border-color:rgba(245,158,11,.25);box-shadow:0 4px 20px rgba(185,28,28,.2)}
.pch{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pca{width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,var(--r2),var(--r1));
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--y5);flex-shrink:0;
  box-shadow:0 0 12px rgba(185,28,28,.3)}
.pcn{font-weight:700;font-size:14px;color:var(--t1)}
.pcp{margin-left:auto;text-align:right}
.pcpv{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--y5)}
.pcpl{font-size:10px;color:var(--t4);text-transform:uppercase;letter-spacing:.4px}
.pcs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.ps{background:var(--bg3);border-radius:7px;padding:8px 4px;text-align:center;
  border:1px solid var(--bdr)}
.psv{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--t1)}
.psl{font-size:9px;color:var(--t4);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}

/* ── HISTÓRICO ───────────────────────────── */
.hcw{position:relative;width:100%;height:260px;margin-bottom:8px;
  background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad);padding:12px}
.hl{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:18px;font-size:12px;color:var(--t4)}
.hli{display:flex;align-items:center;gap:5px;font-weight:500}
.hld{width:10px;height:10px;border-radius:2px}
.hmg{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:10px}
.hmc{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden}
.hmt{background:linear-gradient(135deg,var(--r1),#250A0A);padding:9px 14px;
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;color:var(--y5)}
.hmr{display:flex;justify-content:space-between;padding:6px 14px;font-size:12px;border-top:1px solid var(--bdr)}
.hpos{color:var(--t4);min-width:24px;font-weight:700}
.hnm{flex:1;color:var(--t1)}
.hpt{font-weight:700;color:var(--y5)}

/* ── ÚLTIMA PELADA ───────────────────────── */
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(212px,1fr));gap:10px;margin-top:10px}
.tc{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden}
.tch{padding:10px 14px;font-size:13px;font-weight:700;text-align:center;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;font-size:15px}
.t-b{background:rgba(71,85,105,.25);color:#CBD5E1}
.t-p{background:rgba(15,15,15,.6);color:#9CA3AF}
.t-v{background:rgba(127,29,29,.4);color:var(--r5)}
.tres{text-align:center;font-size:11px;color:var(--t4);padding:4px 14px 7px;border-bottom:1px solid var(--bdr);font-weight:600}
.tj{padding:5px 14px;font-size:12px;color:var(--t3);border-top:1px solid rgba(239,68,68,.06)}

/* ── POWER BI GUIDE ──────────────────────── */
.pbi-wrap{margin-top:20px}
.pbi-box{background:var(--bg2);border:1px solid rgba(245,158,11,.2);border-radius:var(--radl);overflow:hidden;margin-bottom:12px}
.pbi-hdr{background:linear-gradient(135deg,var(--y1),var(--r1));padding:14px 18px;
  display:flex;align-items:center;gap:10px}
.pbi-hdr-icon{font-size:22px}
.pbi-hdr-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--y5)}
.pbi-hdr-sub{font-size:11px;color:var(--t3);margin-top:1px}
.pbi-steps{padding:16px 18px;display:flex;flex-direction:column;gap:14px}
.pbi-step{display:flex;gap:14px;align-items:flex-start}
.pbi-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--r3),var(--r2));
  color:var(--y5);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-family:'Bebas Neue',sans-serif;box-shadow:0 2px 8px rgba(185,28,28,.3)}
.pbi-txt{font-size:13px;color:var(--t2);line-height:1.6}
.pbi-txt b{color:var(--t1)}
.pbi-txt code{background:rgba(185,28,28,.2);border:1px solid rgba(239,68,68,.25);padding:1px 7px;border-radius:4px;font-size:12px;color:var(--r5);font-family:monospace}
.pbi-tip{background:rgba(180,83,9,.1);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:10px 14px;
  font-size:12px;color:var(--y4);display:flex;gap:8px;align-items:flex-start;margin:4px 0}
.pbi-tip-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.pbi-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,.15),transparent);margin:2px 0}

/* ── FOOTER ──────────────────────────────── */
.ft{text-align:center;padding:20px 0 8px;font-size:11px;color:var(--t4);letter-spacing:.5px}
.ft span{color:var(--y4)}
</style>
</head>

const TEMP = { mes:"Maio", ano:2026, peladas:3, ultima:"21/05/2026" };

/* ===== EDITAR AQUI — JOGADORES (atualizar toda semana) =====

/* ===== EDITAR AQUI — ARTILHARIA ===== */
const ARTILHARIA = [
  {nome:"Diego",           gols:5,pres:3},
  {nome:"Jean",            gols:4,pres:3},
  {nome:"Dudex",           gols:4,pres:3},
  {nome:"Rodrigo Azevedo", gols:3,pres:1},

  {nome:"Bernardo Mansoldo",gols:3,pres:1},
  {nome:"Marlos",          gols:2,pres:1},

];

/* ===== EDITAR AQUI — ASSISTÊNCIAS ===== */
const ASSISTENCIAS = [
  {nome:"Dudex",      ass:2,pres:2},
  {nome:"Diego",      ass:2,pres:1},
  {nome:"Rodriguinho",ass:1,pres:1},
  {nome:"Carrilho",   ass:1,pres:1},

  {nome:"Jota",       ass:1,pres:2},
];

/* ===== EDITAR AQUI — HISTÓRICO (adicionar novo mês ao virar o mês) ===== */
const HISTORICO = [
  {mes:"Nov/22",dados:[
    {nome:"Marlos",pts:65},{nome:"Henrique",pts:64},{nome:"César",pts:64},
    {nome:"Jean",pts:54},{nome:"Dudex",pts:50},{nome:"Junior",pts:29},{nome:"Cardassi",pts:24}
  ]},
  {mes:"Jan/23",dados:[
    {nome:"Marlos",pts:73},{nome:"Cardassi",pts:61},{nome:"Dudex",pts:69},
    {nome:"Jean",pts:46},{nome:"Junior",pts:42},{nome:"Rivaldo",pts:30}
  ]},
  {mes:"Abr/26",dados:[
    {nome:"Cardassi",pts:33},{nome:"Fran",pts:34},{nome:"Leo Campos",pts:22},
    {nome:"Jota",pts:20},{nome:"Matheus Martins",pts:17},{nome:"Eduardo Serpa",pts:14},

    {nome:"Rodrigo Azevedo",pts:12},{nome:"Jota",pts:12},{nome:"Vini Paulista",pts:11},{nome:"Diego",pts:9}
  ]},

/* ===== EDITAR AQUI — ÚLTIMA PELADA ===== */
const ULTIMA = {
  data:"21/05/2026",
  times:[
    {nome:"Time Branco", cls:"t-b",res:"2V · 2E · 2D",jogs:["Eduardo","Rivaldo","Cardassi","Jota","Jean","Dudex","Junior","Diego"]},
    {nome:"Time Preto",  cls:"t-p",res:"4V · 1E · 1D",jogs:["Vitor Gomide","Joao lucas","Breder","Bernardo","Galvao","Tutuca","Mumu","Fabio"]},
    {nome:"Time Vermelho",cls:"t-v",res:"0V · 0E · 0D",jogs:[]},
  ]
};
</script>

<div id="app"></div>

<script>
const PAL=["#EF4444","#F59E0B","#FB923C","#FCA5A5","#FCD34D","#B91C1C","#D97706","#FBBF24","#F87171","#FEF3C7"];
let filtro="todos", hChart=null;

function build(){
  const jgs=[...JOGADORES].sort((a,b)=>b.pts-a.pts);
  const tot=jgs.reduce((s,j)=>s+j.pts,0);
  const top3=jgs.slice(0,3);
  document.getElementById("app").innerHTML=`
    <div class="hd">
      <div class="hd-l">
        <div class="hd-logo">⚽</div>
        <div>
          <div class="hd-title">${CFG.nome}</div>
          <div class="hd-sub">desde ${CFG.desde} · ${CFG.dia}</div>
        </div>
      </div>
      <div class="hd-stats">
        <div class="hs"><div class="hs-v">${jgs.filter(j=>j.pts>0).length}</div><div class="hs-l">Jogadores</div></div>
        <div class="hs"><div class="hs-v">${TEMP.peladas}</div><div class="hs-l">Peladas</div></div>
        <div class="hs"><div class="hs-v">${top3[0].pts}</div><div class="hs-l">Líder</div></div>
        <div class="live-badge"><div class="live-dot"></div>${TEMP.mes} ${TEMP.ano}</div>
      </div>
    </div>
    <nav class="nav">
      <button class="nb on" onclick="tab('cl',this)">🏆 <span>Ranking</span></button>
      <button class="nb"    onclick="tab('ar',this)">⚽ <span>Artilharia</span></button>
      <button class="nb"    onclick="tab('as',this)">🤝 <span>Assistências</span></button>
      <button class="nb"    onclick="tab('jg',this)">👥 <span>Jogadores</span></button>
      <button class="nb"    onclick="tab('hi',this)">📈 <span>Histórico</span></button>
      <button class="nb"    onclick="tab('up',this)">📅 <span>Última Pelada</span></button>
    </nav>
    <div id="t-cl" class="tab on">${bClass(jgs,tot,top3)}</div>
    <div id="t-ar" class="tab">${bArt()}</div>
    <div id="t-as" class="tab">${bAss()}</div>
    <div id="t-jg" class="tab">${bJogs(jgs,tot)}</div>
    <div id="t-hi" class="tab">${bHist()}</div>
    <div id="t-up" class="tab">${bUltima()}</div>
    <div class="ft">⚽ <span>${CFG.nome}</span> © ${CFG.desde} · Última atualização: ${TEMP.ultima}</div>`;
  bHistChart();
}

function bClass(jgs,tot,top3){
  const mx=top3[0].pts;
  const pod=`<div class="pod">
    <div class="pi p2"><div class="pmd">🥈</div><div class="pav">${top3[1].ini}</div><div class="pnm">${top3[1].nome}</div><div class="ppt">${top3[1].pts} PTS</div><div class="ppl pl2">2</div></div>
    <div class="pi p1"><div class="pmd">🥇</div><div class="pav">${top3[0].ini}</div><div class="pnm">${top3[0].nome}</div><div class="ppt">${top3[0].pts} PTS</div><div class="ppl pl1">1</div></div>
    <div class="pi p3"><div class="pmd">🥉</div><div class="pav">${top3[2].ini}</div><div class="pnm">${top3[2].nome}</div><div class="ppt">${top3[2].pts} PTS</div><div class="ppl pl3">3</div></div>
  </div>`;
  const rows=jgs.map((j,i)=>{
    const rk=i+1,rc=rk===1?"r1c":rk===2?"r2c":rk===3?"r3c":"";
    const bw=mx>0?Math.round((j.pts/mx)*84):0;
    const pct=tot>0?((j.pts/tot)*100).toFixed(1):"0.0";
    const tc=j.tipo==="M"?"tm":"td",tl=j.tipo==="M"?"Mensalista":"Diarista";
    const fh=(j.forma||"").split(",").map(f=>{const fc=f.trim();return`<div class="${fc==="V"?"fv":fc==="E"?"fe":"fd"}">${fc}</div>`;}).join("");
    return`<tr data-tipo="${j.tipo}" data-nome="${j.nome.toLowerCase()}">
      <td><span class="rn ${rc}">${rk}°</span></td>
      <td class="pnc">${j.nome}</td>
      <td><span class="tb ${tc}">${tl}</span></td>
      <td class="pv">${j.pts}</td>
      <td class="hm"><div class="bw"><div class="bl" style="width:${bw}px"></div><span class="pl">${pct}%</span></div></td>
      <td>${j.gols}</td><td>${j.ass}</td>
      <td class="hm"><div class="fc">${fh}</div></td>
    </tr>`;
  }).join("");
  return`${pod}
    <div class="st">Classificação Geral <span class="bdg bdg-r">PONTOS</span><span class="bdg-m">${TEMP.mes} ${TEMP.ano}</span></div>
    <div class="sb"><span>🔍</span><input type="text" placeholder="Buscar jogador..." oninput="buscar(this.value)"></div>
    <div class="fr">
      <button class="fb on" onclick="ftipo('todos',this)">Todos</button>
      <button class="fb" onclick="ftipo('M',this)">Mensalistas</button>
      <button class="fb" onclick="ftipo('D',this)">Diaristas</button>
    </div>
    <div class="tw"><table>
      <thead><tr><th>#</th><th>Jogador</th><th>Tipo</th><th>PTS</th><th class="hm">%</th><th>⚽</th><th>🤝</th><th class="hm">Forma</th></tr></thead>
      <tbody id="rb">${rows}</tbody>
    </table></div>`;
}

function bArt(){
  const a=ARTILHARIA,mx=a[0]?.gols||1,tot=a.reduce((s,x)=>s+x.gols,0);
  const rows=a.map((x,i)=>{const rc=i<3?["r1c","r2c","r3c"][i]:"";
    return`<tr><td><span class="rn ${rc}">${i+1}°</span></td><td class="pnc">${x.nome}</td>
    <td><b style="color:var(--y5);font-family:'Bebas Neue',sans-serif;font-size:18px">${x.gols}</b></td>
    <td>${x.pres}</td><td><div class="gb" style="width:${Math.round((x.gols/mx)*110)}px"></div></td></tr>`;
  }).join("");
  return`<div class="sg">
    <div class="sc"><div class="sl">Artilheiro do mês</div><div class="sv">${a[0]?.nome||"—"}</div><div class="ss">${a[0]?.gols||0} gols · ${TEMP.mes}/${String(TEMP.ano).slice(-2)}</div></div>
    <div class="sc"><div class="sl">Total de gols</div><div class="sv">${tot}</div><div class="ss">${TEMP.mes} ${TEMP.ano}</div></div>
    <div class="sc"><div class="sl">Média por pelada</div><div class="sv">${TEMP.peladas>0?(tot/TEMP.peladas).toFixed(1):0}</div><div class="ss">gols/semana</div></div>
  </div>
  <div class="st">Artilheiros <span class="bdg bdg-y">GOLS</span><span class="bdg-m">${TEMP.mes} ${TEMP.ano}</span></div>
  <div class="tw"><table><thead><tr><th>#</th><th>Jogador</th><th>Gols</th><th>Presenças</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function bAss(){
  const a=ASSISTENCIAS,mx=a[0]?.ass||1,tot=a.reduce((s,x)=>s+x.ass,0);
  const rows=a.map((x,i)=>{const rc=i<3?["r1c","r2c","r3c"][i]:"";
    return`<tr><td><span class="rn ${rc}">${i+1}°</span></td><td class="pnc">${x.nome}</td>
    <td><b style="color:var(--r5);font-family:'Bebas Neue',sans-serif;font-size:18px">${x.ass}</b></td>
    <td>${x.pres}</td><td><div class="ab" style="width:${Math.round((x.ass/mx)*110)}px"></div></td></tr>`;
  }).join("");
  return`<div class="sg">
    <div class="sc"><div class="sl">Garçom do mês</div><div class="sv">${a[0]?.nome||"—"}</div><div class="ss">${a[0]?.ass||0} assist. · ${TEMP.mes}/${String(TEMP.ano).slice(-2)}</div></div>
    <div class="sc"><div class="sl">Total de assistências</div><div class="sv">${tot}</div><div class="ss">${TEMP.mes} ${TEMP.ano}</div></div>
  </div>
  <div class="st">Assistências <span class="bdg bdg-r">PASSES</span><span class="bdg-m">${TEMP.mes} ${TEMP.ano}</span></div>
  <div class="tw"><table><thead><tr><th>#</th><th>Jogador</th><th>Assist.</th><th>Presenças</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function bJogs(jgs,tot){
  const cards=jgs.map((j,i)=>{
    const pct=tot>0?((j.pts/tot)*100).toFixed(1):"0.0";
    const tc=j.tipo==="M"?"tm":"td",tl=j.tipo==="M"?"Mensalista":"Diarista";
    return`<div class="pc" data-nome="${j.nome.toLowerCase()}">
      <div class="pch">
        <div class="pca">${j.ini}</div>
        <div><div class="pcn">${j.nome}</div><span class="tb ${tc}" style="margin-top:4px;display:inline-block">${tl}</span></div>
        <div class="pcp"><div class="pcpv">${j.pts}</div><div class="pcpl">pontos</div></div>
      </div>
      <div class="pcs">
        <div class="ps"><div class="psv">${i+1}°</div><div class="psl">Ranking</div></div>
        <div class="ps"><div class="psv">${j.gols}</div><div class="psl">Gols</div></div>
        <div class="ps"><div class="psv">${j.ass}</div><div class="psl">Assist.</div></div>
        <div class="ps"><div class="psv">${pct}%</div><div class="psl">Part.</div></div>
      </div>
    </div>`;
  }).join("");
  return`<div class="sb" style="margin-bottom:12px"><span>🔍</span><input type="text" placeholder="Buscar jogador..." oninput="bCard(this.value)"></div>
  <div class="cg" id="cg">${cards}</div>`;
}

function bHist(){
  const h=HISTORICO;
  const names=[...new Set(h.flatMap(m=>m.dados.map(d=>d.nome)))].slice(0,10);
  const leg=names.map((n,i)=>`<div class="hli"><div class="hld" style="background:${PAL[i%PAL.length]}"></div>${n}</div>`).join("");
  const cards=h.map(m=>{
    const s=[...m.dados].sort((a,b)=>b.pts-a.pts);
    return`<div class="hmc"><div class="hmt">${m.mes}</div>
      ${s.map((d,i)=>`<div class="hmr"><span class="hpos">${i+1}°</span><span class="hnm">${d.nome}</span><span class="hpt">${d.pts}</span></div>`).join("")}
    </div>`;
  }).join("");
  return`<div class="st">Evolução de Pontos</div>
  <div class="hcw"><canvas id="hc" role="img" aria-label="Gráfico histórico de pontuação mensal">Histórico.</canvas></div>
  <div class="hl">${leg}</div>
  <div class="st" style="margin-top:4px">Ranking por Mês</div>
  <div class="hmg">${cards}</div>`;
}

function bHistChart(){
  const h=HISTORICO; if(!h.length) return;
  const names=[...new Set(h.flatMap(m=>m.dados.map(d=>d.nome)))].slice(0,10);
  const labels=h.map(m=>m.mes);
  const ds=names.map((n,i)=>({
    label:n,tension:.35,pointRadius:5,borderWidth:2,spanGaps:true,
    borderColor:PAL[i%PAL.length],backgroundColor:PAL[i%PAL.length]+"22",
    data:h.map(m=>{const d=m.dados.find(d=>d.nome===n);return d?d.pts:null;})
  }));
  const c=document.getElementById("hc"); if(!c) return;
  if(hChart) hChart.destroy();
  hChart=new Chart(c,{type:"line",data:{labels,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{color:"#9CA3AF",font:{size:11}},grid:{color:"rgba(239,68,68,.08)"}},
        y:{ticks:{color:"#9CA3AF",font:{size:11}},grid:{color:"rgba(239,68,68,.08)"}}
      }
    }
  });
}

function bUltima(){
  const u=ULTIMA;
  const tcards=u.times.map(t=>`<div class="tc">
    <div class="tch ${t.cls}">${t.nome}</div>
    <div class="tres">${t.res}</div>
    ${t.jogs.map(j=>`<div class="tj">· ${j}</div>`).join("")}
  </div>`).join("");

}

function tab(id,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.querySelectorAll(".nb").forEach(b=>b.classList.remove("on"));
  document.getElementById("t-"+id).classList.add("on");
  btn.classList.add("on");
  if(id==="hi") setTimeout(bHistChart,50);
}
function buscar(q){
  document.querySelectorAll("#rb tr").forEach(tr=>{
    const ok=tr.dataset.nome.includes(q.toLowerCase());
    const okT=filtro==="todos"||tr.dataset.tipo===filtro;
    tr.style.display=ok&&okT?"":"none";
  });
}
function ftipo(t,btn){
  filtro=t;
  document.querySelectorAll(".fb").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  buscar(document.querySelector("#t-cl .sb input")?.value||"");
}
function bCard(q){
  document.querySelectorAll(".pc").forEach(c=>{
    c.style.display=c.dataset.nome.includes(q.toLowerCase())?"":"none";
  });
}
build();
</script>
</body>
</html>
